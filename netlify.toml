# Netlify: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# SPA fallback (refresh / deep links). Static files in dist/ are still served first.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
